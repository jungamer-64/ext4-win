avoid-breaking-exported-api = false

allow-panic-in-tests = false
allow-unwrap-in-tests = false
allow-expect-in-tests = false
allow-indexing-slicing-in-tests = false
allow-dbg-in-tests = false
allow-print-in-tests = false
allow-useless-vec-in-tests = false
allow-large-stack-frames-in-tests = false

allow-unwrap-in-consts = false
allow-expect-in-consts = false

check-private-items = true

disallowed-methods = [
    { path = "alloc::boxed::Box::new", reason = "kernel allocations must cross an explicit fallible allocation boundary" },
    { path = "alloc::vec::Vec::with_capacity", reason = "kernel allocations must reserve through try_reserve and return OutOfMemory" },
]

disallowed-macros = [
    { path = "std::panic", reason = "production kernel paths must return errors or use the explicit fatal boundary" },
    { path = "core::panic", reason = "production kernel paths must return errors or use the explicit fatal boundary" },
    { path = "std::todo", reason = "incomplete control flow must not enter kernel paths" },
    { path = "core::todo", reason = "incomplete control flow must not enter kernel paths" },
    { path = "std::unimplemented", reason = "incomplete control flow must not enter kernel paths" },
    { path = "core::unimplemented", reason = "incomplete control flow must not enter kernel paths" },
    { path = "std::unreachable", reason = "kernel impossibility must be represented by types or explicit fatal state" },
    { path = "core::unreachable", reason = "kernel impossibility must be represented by types or explicit fatal state" },
]
